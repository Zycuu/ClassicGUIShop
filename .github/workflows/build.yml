name: Build ClassicGUIShop

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build ClassicGUIShop
        shell: bash
        run: |
          set +e
          gradle build > build.log 2>&1
          status=$?
          if [ $status -ne 0 ]; then
            grep -n -C 4 -E "error:|FAILURE:|What went wrong|Execution failed" build.log || cat build.log
          else
            tail -n 40 build.log
          fi
          exit $status

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ClassicGUIShop-build-log
          path: build.log

      - name: Upload ClassicGUIShop
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ClassicGUIShop
          path: build/libs/*.jar
