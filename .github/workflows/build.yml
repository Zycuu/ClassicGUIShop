name: Build ClassicGUIShop

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - second-pass-0.2.0

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build ClassicGUIShop
        run: gradle build

      - name: Upload ClassicGUIShop
        uses: actions/upload-artifact@v4
        with:
          name: ClassicGUIShop
          path: build/libs/*.jar
