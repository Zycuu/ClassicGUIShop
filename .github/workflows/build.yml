name: Build ClassicGUIShop v1.3.10
run-name: ClassicGUIShop v1.3.10 - ${{ github.event_name }} - ${{ github.sha }}

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build universal ClassicGUIShop jar
        shell: bash
        run: |
          set +e
          gradle clean build > build.log 2>&1
          status=$?
          if [ $status -ne 0 ]; then
            grep -n -C 4 -E "error:|FAILURE:|What went wrong|Execution failed" build.log || cat build.log
          else
            tail -n 40 build.log
            test -f build/libs/ClassicGUIShop-v1.3.10.jar
          fi
          exit $status

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ClassicGUIShop-build-log
          path: build.log

      - name: Upload ClassicGUIShop
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ClassicGUIShop
          path: |
            build/libs/ClassicGUIShop-v1.3.10.jar
            build/libs/ClassicGUIShop-v1.3.10-sources.jar

  compatibility:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        minecraft:
          - "26.1.1"
          - "26.2"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compile against Minecraft ${{ matrix.minecraft }} without Fabric API dependency
        shell: bash
        env:
          MC_VERSION: ${{ matrix.minecraft }}
        run: |
          set +e
          gradle clean build \
            -Pminecraft_version="$MC_VERSION" \
            > "compatibility-$MC_VERSION.log" 2>&1
          status=$?
          if [ $status -ne 0 ]; then
            grep -n -C 6 -E "error:|FAILURE:|What went wrong|Execution failed" "compatibility-$MC_VERSION.log" \
              || cat "compatibility-$MC_VERSION.log"
          else
            tail -n 40 "compatibility-$MC_VERSION.log"
          fi
          exit $status

      - name: Upload compatibility log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compatibility-${{ matrix.minecraft }}
          path: compatibility-${{ matrix.minecraft }}.log

  runtime-smoke-test:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        minecraft:
          - "26.1.1"
          - "26.2"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Download universal ClassicGUIShop jar
        uses: actions/download-artifact@v4
        with:
          name: ClassicGUIShop
          path: universal

      - name: Prepare Fabric Loader 0.18.3 server without Fabric API for Minecraft ${{ matrix.minecraft }}
        shell: bash
        run: |
          python .github/scripts/setup_fabric_server.py \
            "${{ matrix.minecraft }}" \
            server \
            universal/ClassicGUIShop-v1.3.10.jar \
            0.18.3 \
            false

      - name: Boot universal jar on Loader 0.18.3 without Fabric API
        shell: bash
        run: |
          chmod +x .github/scripts/boot_fabric_server.sh
          .github/scripts/boot_fabric_server.sh server server.log

      - name: Upload runtime log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-${{ matrix.minecraft }}
          path: server/server.log

  version-switch-test:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Download universal ClassicGUIShop jar
        uses: actions/download-artifact@v4
        with:
          name: ClassicGUIShop
          path: universal

      - name: Prepare both Fabric Loader 0.18.3 servers without Fabric API
        shell: bash
        run: |
          python .github/scripts/setup_fabric_server.py \
            26.2 \
            server-26.2 \
            universal/ClassicGUIShop-v1.3.10.jar \
            0.18.3 \
            false
          python .github/scripts/setup_fabric_server.py \
            26.1.1 \
            server-26.1.1 \
            universal/ClassicGUIShop-v1.3.10.jar \
            0.18.3 \
            false
          chmod +x .github/scripts/boot_fabric_server.sh

      - name: Generate the 26.2 catalog
        shell: bash
        run: |
          .github/scripts/boot_fabric_server.sh server-26.2 initial-26.2.log
          test -d server-26.2/config/guishop

      - name: Move the 26.2 configuration to 26.1.1
        shell: bash
        run: |
          mkdir -p server-26.1.1/config
          rm -rf server-26.1.1/config/guishop
          cp -a server-26.2/config/guishop server-26.1.1/config/guishop
          .github/scripts/boot_fabric_server.sh server-26.1.1 downgrade-26.1.1.log

          read -r parked restored <<< "$(
            sed -n 's/.*Runtime listing filter parked \([0-9][0-9]*\), restored \([0-9][0-9]*\).*/\1 \2/p' \
              server-26.1.1/downgrade-26.1.1.log | tail -n 1
          )"
          echo "Downgrade parked $parked listing(s) and restored $restored listing(s)."
          test "${parked:-0}" -gt 0
          test -s server-26.1.1/config/guishop/versioned-listings.json

      - name: Return the same configuration to 26.2
        shell: bash
        run: |
          rm -rf server-26.2/config/guishop
          cp -a server-26.1.1/config/guishop server-26.2/config/guishop
          .github/scripts/boot_fabric_server.sh server-26.2 return-26.2.log

          read -r parked restored <<< "$(
            sed -n 's/.*Runtime listing filter parked \([0-9][0-9]*\), restored \([0-9][0-9]*\).*/\1 \2/p' \
              server-26.2/return-26.2.log | tail -n 1
          )"
          echo "Return parked $parked and restored $restored listing(s)."
          test "${restored:-0}" -gt 0

      - name: Upload version-switch evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: version-switch-26.2-26.1.1-26.2
          path: |
            server-26.2/initial-26.2.log
            server-26.1.1/downgrade-26.1.1.log
            server-26.2/return-26.2.log
            server-26.2/config/guishop/versioned-listings.json
